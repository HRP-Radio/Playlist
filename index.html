<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRP Playlist</title>
    <style>
        /* Dunkles, modernes Premium-Design */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Edles Schwarz */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100%;
        }

        /* Container, der die Playlist sauber umschließt */
        .playlist-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }

        /* Das echte laut.fm-Fenster für Ihren Sender hrp */
        iframe {
            width: 100%;
            height: calc(100% + 55px); /* Macht das Fenster extra lang */
            border: none;
            position: absolute;
            top: -55px; /* Schiebt das laut.fm-Logo und Menü unsichtbar nach oben weg! */
            left: 0;
            /* Dieser Filter verwandelt das helle laut.fm-Design in ein edles Dunkelgrau/Schwarz */
            filter: invert(0.92) hue-rotate(180deg) brightness(1.1); 
        }
    </style>
</head>
<body>

<div class="playlist-wrapper">
    <!-- Lädt die absolut offizielle, ausfallsichere Playlist Ihres Senders -->
    <iframe src="https://laut.fm" scrolling="yes"></iframe>
</div>

</body>
</html>
