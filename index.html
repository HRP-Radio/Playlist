<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRP Playlist</title>
    <style>
        /* Modernes Design im myTuner-Stil */
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* Dunkler Hintergrund */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Widget-Rahmen */
        .mytuner-style-widget {
            max-width: 100%;
            margin: 0 auto;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #242424;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Header-Bereich (Anpassbar an Ihre Farben!) */
        .widget-header {
            background: #d32f2f; /* Hier Ihre Wunschfarbe eintragen (z.B. myTuner Rot) */
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid #b71c1c;
        }

        /* Playlist-Container blockiert das fremde Design und erzwingt sauberes Scrollen */
        .playlist-container {
            width: 100%;
            height: 550px; /* Perfekte Höhe für Google Sites */
            overflow: hidden;
            position: relative;
        }

        /* Der Trick: Wir betten die echte laut.fm-Tagesliste ein, schneiden aber deren Logo ab */
        iframe {
            width: 100%;
            height: 680px; 
            border: none;
            position: absolute;
            top: -50px; /* Schiebt das laut.fm-Logo unsichtbar nach oben weg */
            left: 0;
            filter: invert(0.9) hue-rotate(180deg); /* Optional: Passt helle laut.fm Listen an dunkles Design an */
        }
    </style>
</head>
<body>

<div class="mytuner-style-widget">
    <div class="widget-header">
        🎵 HRP - Song History (Tagesansicht)
    </div>
    <div class="playlist-container">
        <!-- Zieht die echte, vollständige Tagesliste ohne Blockaden -->
        <iframe src="https://laut.fm" scrolling="yes"></iframe>
    </div>
</div>

</body>
</html>
