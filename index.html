<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRP Playlist</title>
    <style>
        /* Edles, dunkles Design angelehnt an Premium-Player */
        html, body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212; /* Sehr edles Dunkelgrau/Schwarz */
            color: #e0e0e0;
        }
        .playlist-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffffff;
            border-bottom: 1px solid #282828;
            padding-bottom: 10px;
        }
        .song-item {
            display: flex;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid #1f1f1f;
            transition: background 0.2s;
        }
        .song-item:hover {
            background-color: #1a1a1a;
        }
        .song-cover {
            width: 45px;
            height: 45px;
            border-radius: 4px;
            margin-right: 15px;
            background: #282828;
            object-fit: cover;
        }
        .song-info {
            flex-grow: 1;
        }
        .song-artist {
            font-weight: bold;
            color: #ffffff;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }
        .song-title {
            color: #aaaaaa;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="playlist-title">Zuletzt gespielt auf HRP</div>
    <div id="playlist-container">Lädt Song-Historie...</div>

    <script>
        // Holt die echten Live-Daten direkt von der laut.fm Schnittstelle
        async function loadPlaylist() {
            try {
                const response = await fetch('https://laut.fm');
                const songs = await response.json();
                const container = document.getElementById('playlist-container');
                container.innerHTML = '';

                if (songs.length === 0) {
                    container.innerHTML = '<p>Aktuell keine Songs verfügbar.</p>';
                    return;
                }

                songs.forEach(song => {
                    const item = document.createElement('div');
                    item.className = 'song-item';
                    
                    // Nutzt das Cover-Bild von laut.fm oder ein Standard-Bild falls keins da ist
                    const coverUrl = song.image_true ? song.image_true : 'https://laut.fm';

                    item.innerHTML = `
                        <img class="song-cover" src="${coverUrl}" alt="Cover">
                        <div class="song-info">
                            <div class="song-artist">${song.artist}</div>
                            <div class="song-title">${song.title}</div>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (error) {
                document.getElementById('playlist-container').innerHTML = '<p>Fehler beim Laden der Playlist.</p>';
            }
        }

        // Playlist sofort laden und alle 30 Sekunden im Hintergrund aktualisieren
        loadPlaylist();
        setInterval(loadPlaylist, 30000);
    </script>

</body>
</html>
